<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Chorival</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a; color: #f1f5f9; min-height: 100vh;
            display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .box { background: #1e293b; border: 1px solid #334155; border-radius: 16px;
            padding: 2.5rem; width: 100%; max-width: 360px; text-align: center; }
        .logo { font-size: 2.8rem; margin-bottom: 0.5rem; }
        h1 { font-size: 1.5rem; font-weight: 800; }
        h1 span { color: #6366f1; }
        p { color: #94a3b8; font-size: 0.88rem; margin: 0.25rem 0 1.75rem; }
        .form-group { text-align: left; margin-bottom: 0.75rem; }
        label { font-size: 0.82rem; color: #94a3b8; display: block; margin-bottom: 0.25rem; }
        input { background: #273549; border: 1px solid #334155; border-radius: 8px;
            color: #f1f5f9; padding: 0.6rem 0.9rem; font-size: 0.95rem; width: 100%; transition: border-color 0.15s; }
        input:focus { outline: none; border-color: #6366f1; }
        button { background: #6366f1; color: #fff; border: none; border-radius: 8px;
            padding: 0.65rem; font-size: 0.95rem; font-weight: 600; width: 100%;
            cursor: pointer; transition: opacity 0.15s; margin-top: 0.5rem; }
        button:hover { opacity: 0.9; }
        .alert { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.3);
            color: #fca5a5; padding: 0.6rem 0.75rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
<div class="box">
    <div class="logo">⚔️</div>
    <h1>Chore<span>Wars</span></h1>
    <p>Sign in to your account</p>
    {% if error %}<div class="alert">{{ error }}</div>{% endif %}
    <form method="POST" action="/login">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" autofocus autocomplete="username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" autocomplete="current-password">
        </div>
        <button type="submit">Sign in</button>
    </form>
</div>
</body>
</html>
