<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Chorival</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a; color: #f1f5f9; min-height: 100vh;
            display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .box { background: #1e293b; border: 1px solid #334155; border-radius: 16px;
            padding: 2.5rem; width: 100%; max-width: 380px; }
        .logo { font-size: 2.2rem; margin-bottom: 0.4rem; text-align: center; }
        h1 { font-size: 1.35rem; font-weight: 800; text-align: center; margin-bottom: 0.2rem; }
        h1 span { color: #6366f1; }
        p { color: #94a3b8; font-size: 0.85rem; text-align: center; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 0.75rem; }
        label { font-size: 0.82rem; color: #94a3b8; display: block; margin-bottom: 0.25rem; }
        input { background: #273549; border: 1px solid #334155; border-radius: 8px;
            color: #f1f5f9; padding: 0.6rem 0.9rem; font-size: 0.9rem; width: 100%; transition: border-color 0.15s; }
        input:focus { outline: none; border-color: #6366f1; }
        button { background: #6366f1; color: #fff; border: none; border-radius: 8px;
            padding: 0.65rem; font-size: 0.95rem; font-weight: 600; width: 100%; cursor: pointer; margin-top: 0.5rem; }
        button:hover { opacity: 0.9; }
        .alert { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.3);
            color: #fca5a5; padding: 0.6rem 0.75rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
<div class="box">
    <div class="logo">⚔️</div>
    <h1>Join Chore<span>Wars</span></h1>
    <p>You've been invited! Create your account.</p>
    {% if error %}<div class="alert">{{ error }}</div>{% endif %}
    <form method="POST" action="/register/{{ token }}">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required autocomplete="username">
        </div>
        <div class="form-group">
            <label>Display name</label>
            <input type="text" name="display_name" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required autocomplete="new-password">
        </div>
        <div class="form-group">
            <label>Confirm password</label>
            <input type="password" name="password2" required autocomplete="new-password">
        </div>
        <button type="submit">Create account</button>
    </form>
</div>
</body>
</html>
