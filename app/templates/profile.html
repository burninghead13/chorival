{% extends "base.html" %}
{% block title %}Profile – Chorival{% endblock %}
{% block content %}
<div class="page-header">
    <h1>👤 My Profile</h1>
    <p>@{{ current_user.username }}</p>
</div>

{% if success %}<div class="alert alert-success">{{ success }}</div>{% endif %}
{% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}

<div class="grid-2">
    <div class="card">
        <div class="card-title">Profile settings</div>
        <form method="POST" action="/profile/update">
            <div class="form-group">
                <label>Display name</label>
                <input type="text" name="display_name" value="{{ current_user.display_name }}" required>
            </div>
            <div class="form-group">
                <label>Color</label>
                <input type="color" name="color" value="{{ current_user.color }}" style="height:38px; cursor:pointer; padding:2px 4px;">
            </div>
            <button type="submit" class="btn btn-primary">Save changes</button>
        </form>
    </div>

    <div class="card">
        <div class="card-title">Change password</div>
        <form method="POST" action="/profile/password">
            <div class="form-group">
                <label>Current password</label>
                <input type="password" name="current_password" required>
            </div>
            <div class="form-group">
                <label>New password</label>
                <input type="password" name="new_password" required>
            </div>
            <div class="form-group">
                <label>Confirm new password</label>
                <input type="password" name="new_password2" required>
            </div>
            <button type="submit" class="btn btn-primary">Update password</button>
        </form>
    </div>
</div>

<div class="card" style="margin-top:1rem;">
    <div class="card-title">💡 Suggest a new task</div>
    <form method="POST" action="/profile/suggest-task">
        <div style="display:grid; grid-template-columns:2fr 1fr 60px auto; gap:0.5rem; align-items:end;">
            <div><label>Task name</label><input type="text" name="name" placeholder="e.g. Clean windows" required></div>
            <div><label>Points</label><input type="number" name="points" value="2" min="1" max="99"></div>
            <div><label>Icon</label><input type="text" name="icon" value="🏠" maxlength="4"></div>
            <div><label>&nbsp;</label><button type="submit" class="btn btn-primary">Submit</button></div>
        </div>
    </form>
</div>
{% endblock %}
